<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Attendance | Face Recognition Attendance System</title>
  <link rel="stylesheet" href="../static/css/styles.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <a class="brand" href="dashboard.html">
        <img class="brand-mark" src="../static/assets/face-logo.svg" alt="Face Attendance logo">
        <span>Face Attendance</span>
      </a>
      <nav class="nav-links" aria-label="Main navigation">
        <a href="dashboard.html">Dashboard</a>
        <a class="active" href="attendance.html">Live Attendance</a>
        <a href="register.html">Register User</a>
        <a href="records.html">Records</a>
        <a href="login.html">Logout</a>
      </nav>
    </aside>

    <main class="content">
      <header class="topbar">
        <div>
          <h1>Live Attendance</h1>
        </div>
      </header>

      <section class="attendance-grid">
        <div class="camera-panel">
          <div class="camera-box" aria-label="Camera placeholder">
            <div class="camera-icon"></div>
            <h2>Live Camera Feed</h2>
            <p>No real camera is connected in this frontend demo.</p>
          </div>
          <div class="camera-actions">
            <span class="status-text" id="attendanceStatus">Waiting for detection...</span>
            <button class="btn primary" type="button" id="startAttendance">Start Attendance</button>
          </div>
        </div>

        <aside class="panel detection-panel">
          <div class="section-heading">
            <h2>Detection Status</h2>
            <p>Mock recognition events will appear here.</p>
          </div>
          <div class="activity-list" id="attendanceLog"></div>
        </aside>
      </section>
    </main>
  </div>

  <script src="../static/js/script.js"></script>
</body>
</html>
