<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance Records | Face Recognition Attendance System</title>
  <link rel="stylesheet" href="../static/css/styles.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <a class="brand" href="dashboard.html">
        <img class="brand-mark" src="../static/assets/face-logo.svg" alt="Face Attendance logo">
        <span>Face Attendance</span>
      </a>
      <nav class="nav-links" aria-label="Main navigation">
        <a href="dashboard.html">Dashboard</a>
        <a href="attendance.html">Live Attendance</a>
        <a href="register.html">Register User</a>
        <a class="active" href="records.html">Records</a>
        <a href="login.html">Logout</a>
      </nav>
    </aside>

    <main class="content">
      <header class="topbar">
        <div>
          <h1>Attendance Records</h1>
        </div>
        <div class="toolbar">
          <input id="recordSearch" type="search" placeholder="Search records">
          <button class="btn primary" type="button" id="exportCsv">Export CSV</button>
        </div>
      </header>

      <section class="panel table-panel">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Student ID</th>
                <th>Date</th>
                <th>Time</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="recordsTable"></tbody>
          </table>
        </div>
        <p class="form-note" id="exportMessage">Search and Export CSV are UI-only tools in this frontend demo.</p>
      </section>
    </main>
  </div>

  <script src="../static/js/script.js"></script>
</body>
</html>
