apiVersion: v1
kind: Namespace
metadata:
  name: face-attendance
---
apiVersion: v1
kind: Secret
metadata:
  name: face-attendance-secret
  namespace: face-attendance
type: Opaque
stringData:
  DEFAULT_ADMIN_EMAIL: admin@example.com
  DEFAULT_ADMIN_PASSWORD: Admin@12345
  SECRET_KEY: minikube-dev-secret-change-me
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: face-attendance-instance
  namespace: face-attendance
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: face-attendance-web
  namespace: face-attendance
spec:
  replicas: 5
  selector:
    matchLabels:
      app: face-attendance-web
  template:
    metadata:
      labels:
        app: face-attendance-web
    spec:
      containers:
        - name: web
          image: face-attendance-system:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          env:
            - name: TZ
              value: Asia/Manila
            - name: DEFAULT_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: face-attendance-secret
                  key: DEFAULT_ADMIN_EMAIL
            - name: DEFAULT_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: face-attendance-secret
                  key: DEFAULT_ADMIN_PASSWORD
            - name: DEFAULT_ADMIN_ENABLED
              value: "1"
            - name: FACE_MATCH_THRESHOLD
              value: "88"
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: face-attendance-secret
                  key: SECRET_KEY
            - name: GUNICORN_WORKERS
              value: "1"
            - name: GUNICORN_THREADS
              value: "2"
            - name: GUNICORN_TIMEOUT
              value: "120"
          readinessProbe:
            httpGet:
              path: /readyz
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: instance-data
              mountPath: /app/instance
      volumes:
        - name: instance-data
          persistentVolumeClaim:
            claimName: face-attendance-instance
---
apiVersion: v1
kind: Service
metadata:
  name: face-attendance-service
  namespace: face-attendance
spec:
  type: NodePort
  selector:
    app: face-attendance-web
  ports:
    - name: http
      port: 80
      targetPort: 5000
      nodePort: 30080
