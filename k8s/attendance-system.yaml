apiVersion: v1
kind: Namespace
metadata:
  name: face-attendance
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: face-attendance-instance
  namespace: face-attendance
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: face-attendance-web
  namespace: face-attendance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: face-attendance-web
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: face-attendance-web
    spec:
      containers:
        - name: web
          image: ghcr.io/23-75125-pixel/iasccofficial:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: APP_TIMEZONE
              value: Asia/Manila
            - name: TZ
              value: Asia/Manila
            - name: DEFAULT_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: face-attendance-secret
                  key: DEFAULT_ADMIN_EMAIL
            - name: DEFAULT_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: face-attendance-secret
                  key: DEFAULT_ADMIN_PASSWORD
            - name: DEFAULT_ADMIN_ENABLED
              value: "1"
            - name: FACE_MATCH_THRESHOLD
              value: "72"
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: face-attendance-secret
                  key: SECRET_KEY
            - name: GUNICORN_WORKERS
              value: "1"
            - name: GUNICORN_THREADS
              value: "2"
            - name: GUNICORN_TIMEOUT
              value: "180"
          startupProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 5
            timeoutSeconds: 5
            periodSeconds: 5
            failureThreshold: 24
          readinessProbe:
            httpGet:
              path: /readyz
              port: 5000
            initialDelaySeconds: 5
            timeoutSeconds: 10
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 30
            timeoutSeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: instance-data
              mountPath: /app/instance
      volumes:
        - name: instance-data
          persistentVolumeClaim:
            claimName: face-attendance-instance
---
apiVersion: v1
kind: Service
metadata:
  name: face-attendance-service
  namespace: face-attendance
spec:
  type: NodePort
  selector:
    app: face-attendance-web
  ports:
    - name: http
      port: 80
      targetPort: 5000
      nodePort: 30080
