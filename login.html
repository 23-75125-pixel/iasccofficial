<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Face Recognition Attendance System</title>
  <link rel="stylesheet" href="../static/css/styles.css">
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-panel">
      <div class="brand-block">
        <img class="brand-mark" src="../static/assets/face-logo.svg" alt="Face Attendance logo">
        <div>
          <h1>Face Attendance</h1>
          <p>Student attendance portal</p>
        </div>
      </div>

      <form class="login-form" id="loginForm">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="admin@example.com" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="Enter password" required>

        <button class="btn primary" type="submit">Login</button>
        <p class="form-note" id="loginMessage">Frontend demo only. Use any email and password.</p>
      </form>
    </section>
  </main>

  <script src="../static/js/script.js"></script>
</body>
</html>
