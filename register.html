<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register User | Face Recognition Attendance System</title>
  <link rel="stylesheet" href="../static/css/styles.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <a class="brand" href="dashboard.html">
        <img class="brand-mark" src="../static/assets/face-logo.svg" alt="Face Attendance logo">
        <span>Face Attendance</span>
      </a>
      <nav class="nav-links" aria-label="Main navigation">
        <a href="dashboard.html">Dashboard</a>
        <a href="attendance.html">Live Attendance</a>
        <a class="active" href="register.html">Register User</a>
        <a href="records.html">Records</a>
        <a href="login.html">Logout</a>
      </nav>
    </aside>

    <main class="content">
      <header class="topbar">
        <div>
          <h1>Register User</h1>
        </div>
      </header>

      <section class="form-layout">
        <form class="panel register-form" id="registerForm">
          <label for="name">Full Name</label>
          <input id="name" name="name" type="text" placeholder="Student full name" required>

          <label for="studentId">Student ID</label>
          <input id="studentId" name="studentId" type="text" placeholder="STU-2026-001" required>

          <label for="course">Course</label>
          <input id="course" name="course" type="text" placeholder="BS Computer Science" required>

          <div class="button-row">
            <button class="btn secondary" type="button" id="captureFace">Capture Face</button>
            <button class="btn primary" type="submit">Save User</button>
          </div>
          <p class="form-note" id="registerMessage">Capture Face and Save User are UI-only placeholders.</p>
        </form>

        <aside class="panel preview-panel">
          <div class="face-preview" id="facePreview">No face captured</div>
          <p>Captured face preview will appear here after backend integration.</p>
        </aside>
      </section>
    </main>
  </div>

  <script src="../static/js/script.js"></script>
</body>
</html>
