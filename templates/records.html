{% extends "base.html" %}

{% block title %}Attendance Records | Face Recognition Attendance System{% endblock %}

{% block content %}
<header class="page-header-row">
  <div>
    <h1 class="page-title">Attendance Records</h1>
    <p class="page-subtitle">Search and export saved attendance logs.</p>
  </div>
  <div class="flex flex-col gap-2 sm:flex-row sm:items-center">
    <input class="form-input min-w-64" id="recordSearch" type="search" placeholder="Search records">
    <button class="btn btn-primary" type="button" id="exportCsv">Export CSV</button>
  </div>
</header>

<section class="table-shell">
  <div class="overflow-x-auto">
    <table class="data-table min-w-[900px]">
      <thead>
        <tr class="table-head-row">
          <th class="table-th">Name</th>
          <th class="table-th">Student ID</th>
          <th class="table-th">Course</th>
          <th class="table-th">Date</th>
          <th class="table-th">Time</th>
          <th class="table-th">Status</th>
          <th class="table-th">Confidence</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-100" id="recordsTable">
        <tr>
          <td class="table-td-muted" colspan="7">Loading records...</td>
        </tr>
      </tbody>
    </table>
  </div>
  <p class="mt-3 min-h-5 text-sm text-muted" id="exportMessage"></p>
</section>
{% endblock %}
